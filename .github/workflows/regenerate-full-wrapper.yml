name: Regenerate Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  regen:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Gradle 8.10
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.10

      - name: Regenerate wrapper
        run: gradle wrapper --gradle-version 8.10

      - name: Make wrapper executable
        run: chmod +x gradlew

      - name: Commit regenerated wrapper
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gradlew gradlew.bat gradle/wrapper/
          git commit -m "Regenerate Gradle wrapper 8.10" || echo "No changes"
          git push
