plugins {
    id 'fabric-loom' version '1.7.413'
}

group = "com.example.reclaimer"
version = "1.21.1"

base {
    archivesName = "reclaimer"
}

repositories {
    maven {
        url = "https://maven.fabricmc.net/"
        metadataSources {
            mavenPom()
            artifact()
        }
    }

    mavenCentral()
    maven { url = "https://maven.shedaniel.me/" }
}

dependencies {
    // Minecraft 1.21.1
    minecraft "com.mojang:minecraft:1.21.1"
    mappings loom.officialMojangMappings()

    // Fabric Loader (current stable for 1.21.1)
    modImplementation "net.fabricmc:fabric-loader:0.16.10"

    // Fabric API for 1.21.1 (stable, no weird javadoc issues)
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.116.11+1.21.1"

    // Cloth Config (adjust if you need a different version)
    modImplementation "me.shedaniel.cloth:cloth-config-fabric:15.0.140"
    include "me.shedaniel.cloth:cloth-config-fabric:15.0.140"
}

loom {
    splitEnvironmentSourceSets()

    interfaceInjection {
        enableDependencyInterfaceInjection = false
    }

    // Safe default; avoids remapping nested jars you don't need
    remapJar {
        addNestedDependencies = false
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
    options.release = 21
}

jar {
    from("LICENSE") {
        rename { "${it}_${base.archivesName.get()}" }
    }
}
