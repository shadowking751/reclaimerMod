plugins {
    id 'fabric-loom' version '1.7.4'
}

group = "com.example.reclaimer"
version = "1.21.11"

base {
    archivesName = "reclaimer"
}

repositories {
    mavenCentral()
    maven { url = "https://maven.fabricmc.net/" }
    maven { url = "https://maven.shedaniel.me/" }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings loom.officialMojangMappings()

    // FIXED: correct group + correct format
    modImplementation "net.fabricmc:fabric-loader:0.16.10"

    // Fabric API for 1.21.11 with Mojang mapping support
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.104.0+1.21.11"

    // Cloth Config
    modImplementation "me.shedaniel.cloth:cloth-config-fabric:15.0.140"
    include "me.shedaniel.cloth:cloth-config-fabric:15.0.140"
}

loom {
    splitEnvironmentSourceSets()

    interfaceInjection {
        enableDependencyInterfaceInjection = false
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
    options.release = 21
}

jar {
    from("LICENSE") {
        rename { "${it}_${base.archivesName.get()}" }
    }
}
