plugins {
    id 'fabric-loom' version '1.7.4'
}

group = "com.example.reclaimer"
version = "1.21.11"

base {
    archivesName = "reclaimer"
}

repositories {
    // Your environment resolves 1.21.11 artifacts from this endpoint.
    maven {
        url = "https://maven.fabricmc.net/"
        metadataSources {
            mavenPom()
            artifact()
        }
    }

    mavenCentral()
    maven { url = "https://maven.shedaniel.me/" }
}

dependencies {
    // Minecraft 1.21.11 (confirmed available in your environment)
    minecraft "com.mojang:minecraft:1.21.11"
    mappings loom.officialMojangMappings()

    // Fabric Loader (supports future versions)
    modImplementation "net.fabricmc:fabric-loader:0.16.10"

    // Fabric API for 1.21.11 (confirmed available)
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.139.4+1.21.11_unobfuscated"

    // Cloth Config
    modImplementation "me.shedaniel.cloth:cloth-config-fabric:15.0.140"
    include "me.shedaniel.cloth:cloth-config-fabric:15.0.140"
}

loom {
    splitEnvironmentSourceSets()

    interfaceInjection {
        enableDependencyInterfaceInjection = false
    }

    // Prevent Loom from trying to remap nested jars
    remapJar {
        addNestedDependencies = false
    }
}

// Correct fix: exclude Fabric API javadoc and sources jars
configurations.all {
    exclude group: "net.fabricmc.fabric-api", module: "fabric-api", classifier: "javadoc"
    exclude group: "net.fabricmc.fabric-api", module: "fabric-api", classifier: "sources"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
    options.release = 21
}

jar {
    from("LICENSE") {
        rename { "${it}_${base.archivesName.get()}" }
    }
}
