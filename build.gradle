plugins {
    id 'fabric-loom' version '1.7.4'
    id 'maven-publish'
}

version = "1.0.0"
group = "com.example.reclaimer"

base {
    archivesName = "reclaimer"
}

repositories {
    mavenCentral()
    maven { url = "https://maven.fabricmc.net/" }
    maven { url = "https://maven.shedaniel.me/" } // Cloth Config
}

dependencies {
    // Minecraft + Yarn mappings
    minecraft "com.mojang:minecraft:1.20.4"
    mappings "net.fabricmc:yarn:1.20.4+build.3:v2"

    // Fabric Loader
    modImplementation "net.fabricmc:fabric-loader:0.15.11"

    // Fabric API
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.97.8+1.20.4"

    // Cloth Config (includes AutoConfig)
    modImplementation "me.shedaniel.cloth:cloth-config-fabric:12.0.109"
    include "me.shedaniel.cloth:cloth-config-fabric:12.0.109"
}

loom {
    splitEnvironmentSourceSets()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
    options.release = 17
}

jar {
    from("LICENSE") {
        rename { "${it}_${base.archivesName.get()}" }
    }
}
