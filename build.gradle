plugins {
    id 'fabric-loom' version '1.7.4'
}

group = "com.example.reclaimer"
version = "1.21.11"

base {
    archivesName = "reclaimer"
}

repositories {
    maven {
        url = "https://maven.fabricmc.net/"
        metadataSources {
            mavenPom()
            artifact()
        }
    }

    mavenCentral()
    maven { url = "https://maven.shedaniel.me/" }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings loom.officialMojangMappings()

    modImplementation "net.fabricmc:fabric-loader:0.16.10"

    // Fabric API for 1.21.11
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.139.5+1.21.11"

    modImplementation "me.shedaniel.cloth:cloth-config-fabric:15.0.140"
    include "me.shedaniel.cloth:cloth-config-fabric:15.0.140"
}

loom {
    splitEnvironmentSourceSets()

    interfaceInjection {
        enableDependencyInterfaceInjection = false
    }

    remapJar {
        addNestedDependencies = false
    }
}

// Remove the module that contains the invalid javadoc jars
configurations.all {
    exclude group: "net.fabricmc.fabric-api", module: "fabric-content-registries-v0"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
    options.release = 21
}

jar {
    from("LICENSE") {
        rename { "${it}_${base.archivesName.get()}" }
    }
}
