plugins {
    id 'fabric-loom' version 'RECOMMENDED_LOOM_FOR_1.21.11'
    id 'maven-publish'
}

group = "com.example.reclaimer"
version = "1.21.11"

base {
    archivesName = "reclaimer"
}

repositories {
    mavenCentral()
    maven { url = "https://maven.fabricmc.net/" }
    maven { url = "https://maven.shedaniel.me/" }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings "net.fabricmc:yarn:1.21.11+build.X:v2"

    modImplementation "net.fabricmc:fabric-loader:LOADER_FOR_1.21.11"
    modImplementation "net.fabricmc.fabric-api:fabric-api:FABRIC_API_FOR_1.21.11"

    modImplementation "me.shedaniel.cloth:cloth-config-fabric:15.0.140"
    include "me.shedaniel.cloth:cloth-config-fabric:15.0.140"
}

loom {
    splitEnvironmentSourceSets()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
    options.release = 21
}

jar {
    from("LICENSE") {
        rename { "${it}_${base.archivesName.get()}" }
    }
}
